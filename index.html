    #splash .logo { font-size: 20px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; color: #C4956A; margin-bottom: 8px; }

    #splash .dot { width: 6px; height: 6px; border-radius: 50%; background: #C4956A; margin-top: 24px; animation: pulse 1.2s infinite; }

    /* Install prompt banner */
    #install-banner { display: none; position: fixed; bottom: 80px; left: 16px; right: 16px; max-width: 408px; margin: 0 auto; background: #1A1A1A; color: #FFF; border-radius: 16px; padding: 16px 20px; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }

    #install-banner .desc { font-size: 11px; color: #999; margin-bottom: 12px; }
    #install-banner .btns { display: flex; gap: 8px; }
    #install-banner .btn-install { padding: 8px 20px; border-radius: 8px; border: none; background: #C4956A; color: #FFF; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
    #install-banner .btn-dismiss { padding: 8px 16px; border-radius: 8px; border: 1px solid #333; background: none; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; }

  <script>
    // Service Worker registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // PWA Install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').style.display = 'block';
    });
    document.getElementById('btn-install')?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';
      }
    });
    document.getElementById('btn-dismiss')?.addEventListener('click', () => {
      document.getElementById('install-banner').style.display = 'none';
    });
  </script>

  // ─── Photo Try-On Logic ─────────────────────────────────
  const extractDominantColor = (imgSrc, slot) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = 50;
      canvas.height = 50;
      ctx.drawImage(img, 0, 0, 50, 50);
      const data = ctx.getImageData(0, 0, 50, 50).data;
      let r = 0, g = 0, b = 0, count = 0;
      for (let i = 0; i < data.length; i += 16) {
        const pr = data[i], pg = data[i+1], pb = data[i+2], pa = data[i+3];
        if (pa < 128) continue;
        // skip very white/background pixels
        if (pr > 240 && pg > 240 && pb > 240) continue;
        if (pr < 15 && pg < 15 && pb < 15) continue;
        r += pr; g += pg; b += pb; count++;
      }
      if (count === 0) count = 1;
      r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);
      const hex = "#" + [r, g, b].map(x => x.toString(16).padStart(2, "0")).join("");
      setPhotoDominantColors(prev => ({ ...prev, [slot]: hex }));
      generatePhotoFeedback(hex, slot);
    };
    img.src = imgSrc;
  };

      setPhotoUploads(prev => ({ ...prev, [slot]: dataUrl }));
      extractDominantColor(dataUrl, slot);

    reader.readAsDataURL(file);
  };

    const b = parseInt(hex.slice(5, 7), 16);
    const isWarm = r > b;
    const isNeutral = Math.abs(r - g) < 30 && Math.abs(g - b) < 30;
    const isDark = (r + g + b) / 3 < 80;
    const isLight = (r + g + b) / 3 > 200;

    const slotLabels = { top: "top", bottom: "bottom", dress: "dress", shoes: "shoes", outer: "jacket", necklace: "necklace", watch: "watch", earrings: "earrings", ring: "ring" };
    const slotName = slotLabels[slot] || "piece";

    let skinMatch = "neutral";
    let skinComment = "";
    const isWarmSkin = ["#FDEBD0","#F5CBA7","#D4A07A","#BA8B5C"].includes(selectedSkinTone);
    if (isNeutral) {
      skinMatch = "great";
      skinComment = `Neutrals are universally flattering — this ${slotName} will pair with almost anything in your closet`;
    } else if ((isWarmSkin && isWarm) || (!isWarmSkin && !isWarm)) {
      skinMatch = "great";
      skinComment = `This color is in your ${colorAnalysisLocal.season.toLowerCase()} family — it's going to look gorgeous against your skin`;
    } else {
      skinMatch = "okay";
      skinComment = `This is outside your ideal color season, but contrast can be beautiful — try pairing it with a neutral to balance`;
    }

    let fitAdvice = "";
    if (slot === "top" || slot === "dress") {
      fitAdvice = isDark
        ? "Dark colors on top are incredibly slimming and create a polished line on your frame"
        : isLight
        ? "Light tops draw the eye up beautifully — great for balancing your petite & curvy silhouette"
        : "This mid-tone is versatile — tuck it in or belt it to show off your waist";
    } else if (slot === "bottom") {
      fitAdvice = isDark
        ? "Dark bottoms are your best friend — they elongate your legs and create a seamless lower half"
        : "A lighter bottom draws attention down — pair with a darker or fitted top to keep proportions balanced";
    } else if (slot === "shoes") {
      fitAdvice = isLight || isNeutral
        ? "Nude or light shoes visually extend your leg line — a petite girl's secret weapon. Pointed toes add even more length"
        : isDark
        ? "Dark shoes ground the outfit and pair with almost anything — ankle boots with a V-cut are amazing for petite frames"
        : "A pop of color on your feet draws the eye down and adds personality — balance with quieter tones above";
    } else if (slot === "outer") {
      fitAdvice = "For your petite frame, make sure this hits at the hip or above — long coats can overwhelm";
    } else if (slot === "necklace") {
      const isGold = isWarm && (r > 180 && g > 140 && b < 100);
      const isSilver = isNeutral && (r + g + b) / 3 > 150;
      fitAdvice = isGold
        ? "Gold is *chef's kiss* on your skin tone — a pendant that sits at your collarbone draws the eye up and elongates your neck beautifully"
        : isSilver
        ? "Silver is striking — for a petite frame, keep necklaces above the bust line so they don't visually shorten your torso"
        : "V-shaped or pendant necklaces are your best friend — they create a vertical line that elongates your neckline and torso";
    } else if (slot === "watch") {
      fitAdvice = isLight || isNeutral
        ? "A delicate watch adds polish without overwhelming your wrist — for petite frames, keep the face under 36mm for perfect proportions"
        : isDark
        ? "A dark-faced watch is bold and chic — it draws attention to your wrist which is one of the most elegant parts of the body"
        : "This watch color will pop against your skin — make sure the band fits snug (not loose) for the most flattering look on a petite wrist";
    } else if (slot === "earrings") {
      fitAdvice = isDark
        ? "Dark statement earrings frame your face gorgeously — for petite proportions, drop earrings that end above the shoulder are perfect"
        : isLight
        ? "Light or pearl earrings keep the look soft and feminine — studs are timeless, drops add drama without weight"
        : "These will catch the eye right at your face — earrings are the #1 accessory people notice first, and these are going to look stunning";
    } else if (slot === "ring") {
      fitAdvice = isWarm
        ? "Warm-toned rings look gorgeous on your hands — stacking thin bands is a great move for petite fingers"
        : "Cool-toned rings pop beautifully — for petite hands, keep rings proportional and avoid oversized cocktail styles unless it's a statement piece";
    } else {
      fitAdvice = "Accessories are the finishing touch — gold tones are especially flattering with your warm coloring";
    }

    // Check harmony with other uploaded pieces
    const otherColors = Object.entries(photoDominantColors).filter(([k, v]) => k !== slot && v).map(([k, v]) => v);
    let harmonyNote = "";
    if (otherColors.length > 0) {
      const clashing = otherColors.some(oc => {
        const or2 = parseInt(oc.slice(1, 3), 16);
        const og = parseInt(oc.slice(3, 5), 16);
        const ob = parseInt(oc.slice(5, 7), 16);
        const otherWarm = or2 > ob;
        return (isWarm && !otherWarm && !isNeutral) || (!isWarm && otherWarm && !isNeutral);
      });
      harmonyNote = clashing
        ? "Heads up — this mixes warm and cool tones with your other pieces. It can work as intentional contrast, but try a neutral to bridge them"
        : "This harmonizes nicely with the other pieces you've selected — the tones complement each other";

  };

                <div key={tone.name} onClick={() => setSelectedSkinTone(tone.color)} style={{ textAlign: "center", cursor: "pointer" }}>
                  <div style={{ width: 36, height: 36, borderRadius: "50%", background: tone.color, border: selectedSkinTone === tone.color ? "3px solid #1A1A1A" : "2px solid #E8E4DF", transition: "all 0.2s" }} />
                  <div style={{ fontSize: 8, color: selectedSkinTone === tone.color ? "#1A1A1A" : "#BBB", marginTop: 4, fontWeight: selectedSkinTone === tone.color ? 500 : 400 }}>{tone.name}</div>
                </div>
              ))}
            </div>

            {/* Season result */}
            <div style={{ padding: 14, borderRadius: 12, background: "#FFF", border: "1px solid #F0EDE8", marginBottom: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 500, letterSpacing: 1, textTransform: "uppercase", color: "#C4956A", marginBottom: 8 }}>{colorAnalysis.season}</div>
              <div style={{ fontSize: 12, color: "#666", lineHeight: 1.6, marginBottom: 12 }}>{colorAnalysis.tip}</div>

              <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: 1, textTransform: "uppercase", color: "#666", marginBottom: 6 }}>Your Best Colors</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
                {colorAnalysis.best.map((c, i) => (
                  <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <div style={{ width: 32, height: 32, borderRadius: 8, background: c, border: c === "#FFFFFF" ? "1px solid #E8E4DF" : "none" }} />
                    <span style={{ fontSize: 8, color: "#888" }}>{colorAnalysis.bestNames[i]}</span>
                  </div>
                ))}
              </div>

              <div style={{ fontSize: 10, fontWeight: 500, letterSpacing: 1, textTransform: "uppercase", color: "#666", marginBottom: 6 }}>Colors to Be Careful With</div>
              <div style={{ display: "flex", gap: 6 }}>
                {colorAnalysis.avoid.map((c, i) => (
                  <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <div style={{ width: 32, height: 32, borderRadius: 8, background: c, opacity: 0.5, position: "relative" }}>
                      <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", fontSize: 16, color: "#FFF" }}>×</div>
                    </div>
                    <span style={{ fontSize: 8, color: "#BBB" }}>{colorAnalysis.avoidNames[i]}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Your wardrobe scored against skin tone */}
          <div style={S.section}>Your Closet — Color Rated</div>
          <div style={{ fontSize: 11, color: "#888", marginBottom: 12, marginTop: -8 }}>How well each piece complements your skin tone</div>
          {wardrobe.map(item => {
            const isGreat = colorAnalysis.best.includes(item.color);
            return (
              <div key={item.id} style={{ ...S.card, padding: 12, display: "flex", alignItems: "center", gap: 10, borderLeft: isGreat ? "3px solid #6B8E6B" : "3px solid #E8E4DF" }}>
                <span style={{ fontSize: 20 }}>{item.image}</span>
                <div style={S.dot(item.color, 20)} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, fontWeight: 400 }}>{item.name}</div>
                  <div style={{ fontSize: 10, color: "#888" }}>{item.colorName}</div>
                </div>
                <span style={{ fontSize: 10, padding: "3px 8px", borderRadius: 8, background: isGreat ? "#F0F5F0" : "#F5F2ED", color: isGreat ? "#6B8E6B" : "#888" }}>
                  {isGreat ? "Great match" : "Neutral"}
                </span>
              </div>
            );
          })}
        </>
      )}
    </div>
  );

  // ─── Render ───────────────────────────────────────────────
  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={S.logo}>Catalina's</div>
        <div style={{ fontSize: 11, color: "#888", display: "flex", alignItems: "center", gap: 4 }}>
          {WEATHER_DATA.icon} {WEATHER_DATA.temp}
        </div>
      </div>

      <div style={{ padding: "14px 24px 100px" }}>
        {tab === "dress" && renderDressMe()}
        {tab === "closet" && renderCloset()}
        {tab === "tryon" && renderTryOn()}
        {tab === "inspire" && renderInspire()}
        {tab === "shop" && renderShop()}
      </div>

      <div style={S.nav}>
        {[
          { key: "dress", icon: Icon.Magic, label: "Dress Me" },
          { key: "closet", icon: Icon.Closet, label: "Closet" },
          { key: "tryon", icon: Icon.Sparkle, label: "Try On" },
          { key: "inspire", icon: Icon.Star, label: "Inspire" },
          { key: "shop", icon: Icon.Bag, label: "Shop" },
        ].map(t => (
          <button key={t.key} style={S.navBtn(tab === t.key)} onClick={() => setTab(t.key)}>
            <t.icon />
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(FashionApp));

    // Hide splash after render
    setTimeout(() => {
      document.getElementById('splash')?.classList.add('hide');
      setTimeout(() => document.getElementById('splash')?.remove(), 600);
    }, 1200);
  </script>
</body>
</html>
